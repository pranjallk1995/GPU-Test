services:
  gpu-test:
    image: tensorflow/tensorflow:latest-gpu  #do not use latest! Support may not always exist with the installed CUDA drivers.
    container_name: gpu-test
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: nvidia-smi
      interval: 5s
      timeout: 5s
      retries: 3
    command: sleep infinity
